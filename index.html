<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2e9b32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CHUITECHMA Chatbot">
<meta name="description" content="CHUITECHMA University Chatbot - Your smart assistant for admissions, fees, departments, and campus information">
<meta name="keywords" content="CHUITECHMA, university, chatbot, admissions, fees, departments, education">
<meta name="author" content="CHUITECHMA University">
<title>CHUITECHMA CHAT BOT</title>

<style>
    * {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    .container {
        width: 100%;
        max-width: 1200px;
        height: 650px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        display: flex;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        position: relative;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, limegreen, #2e9b32, limegreen);
        animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
        0%, 100% { transform: translateX(-100%); }
        50% { transform: translateX(100%); }
    }

    /* Main Panel */
    .main {
        flex: 1;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        text-align: center;
        padding: 60px 50px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    .main::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(46, 155, 50, 0.05) 0%, transparent 70%);
        animation: float 20s ease-in-out infinite;
    }
    
    @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(30px, -30px) rotate(120deg); }
        66% { transform: translate(-20px, 20px) rotate(240deg); }
    }

    .logo-top {
        width: 110px;
        margin: 0 auto;
        display: block;
        margin-bottom: 30px;
        filter: drop-shadow(0px 8px 16px rgba(46, 155, 50, 0.2));
        transition: transform 0.3s ease;
        z-index: 1;
        position: relative;
        border-radius: 20px;
        padding: 8px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
        backdrop-filter: blur(10px);
        box-shadow: 
            0 8px 32px rgba(46, 155, 50, 0.15),
            0 2px 8px rgba(0, 0, 0, 0.1),
            inset 0 1px 0 rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(46, 155, 50, 0.1);
    }
    
    .logo-top::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: -1;
    }
    
    .logo-top:hover {
        transform: scale(1.05) translateY(-5px) rotate(2deg);
        box-shadow: 
            0 12px 40px rgba(46, 155, 50, 0.25),
            0 4px 12px rgba(0, 0, 0, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    
    .logo-top:hover::before {
        opacity: 0.1;
    }
    
    .logo-top:active {
        transform: scale(1.02) translateY(-2px);
        transition: transform 0.1s ease;
    }
    
    /* Logo card animation */
    @keyframes logoFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }
    
    .logo-top {
        animation: logoFloat 6s ease-in-out infinite;
    }
    
    .logo-top:hover {
        animation-play-state: paused;
    }

    h1 {
        font-size: 42px;
        font-weight: 700;
        color: limegreen;
        margin-top: 20px;
        line-height: 1.2;
        letter-spacing: -0.5px;
        z-index: 1;
        position: relative;
        background: linear-gradient(135deg, limegreen, #2e9b32);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    p {
        margin-top: 20px;
        font-size: 18px;
        color: #555;
        line-height: 1.6;
        max-width: 500px;
        z-index: 1;
        position: relative;
        font-weight: 400;
    }

    .start-btn {
        margin-top: 40px;
        background: linear-gradient(135deg, limegreen, #2e9b32);
        border: none;
        padding: 18px 40px;
        color: white;
        font-size: 18px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 8px 25px rgba(46, 155, 50, 0.3);
        position: relative;
        overflow: hidden;
        z-index: 1;
    }
    
    .start-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s ease;
    }

    .start-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 35px rgba(46, 155, 50, 0.4);
    }
    
    .start-btn:hover::before {
        left: 100%;
    }
    
    .start-btn:active {
        transform: translateY(-1px);
    }

    .language-selector {
        margin-top: 25px;
        padding: 12px 20px;
        border: 2px solid limegreen;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(46, 155, 50, 0.1);
        z-index: 1;
        position: relative;
    }
    
    .language-selector:hover {
        border-color: #2e9b32;
        box-shadow: 0 6px 20px rgba(46, 155, 50, 0.2);
        transform: translateY(-2px);
    }
    
    .language-selector:focus {
        outline: none;
        border-color: #2e9b32;
        box-shadow: 0 0 0 3px rgba(46, 155, 50, 0.1);
    }
    
    /* Enhanced Responsive Design */
    @media (max-width: 1200px) {
        .container {
            max-width: 95%;
            margin: 20px;
        }
    }
    
    @media (max-width: 768px) {
        body {
            padding: 0;
            align-items: stretch;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            margin: 0;
            box-shadow: none;
        }
        
        .main {
            padding: 40px 30px;
            justify-content: center;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 32px;
            line-height: 1.1;
        }
        
        p {
            font-size: 16px;
            max-width: 100%;
            padding: 0 10px;
        }
        
        .logo-top {
            width: 90px;
            margin-bottom: 25px;
        }
        
        .start-btn {
            padding: 16px 32px;
            font-size: 17px;
            margin-top: 35px;
        }
        
        .language-selector {
            padding: 10px 16px;
            font-size: 15px;
            margin-top: 20px;
        }
    }
    
    @media (max-width: 480px) {
        .main {
            padding: 30px 20px;
        }
        
        h1 {
            font-size: 28px;
        }
        
        p {
            font-size: 15px;
            line-height: 1.5;
        }
        
        .logo-top {
            width: 80px;
            margin-bottom: 20px;
        }
        
        .start-btn {
            padding: 14px 28px;
            font-size: 16px;
            margin-top: 30px;
        }
        
        .language-selector {
            padding: 8px 14px;
            font-size: 14px;
            margin-top: 15px;
        }
    }
    
    @media (max-width: 360px) {
        .main {
            padding: 25px 15px;
        }
        
        h1 {
            font-size: 24px;
        }
        
        .start-btn {
            padding: 12px 24px;
            font-size: 15px;
            width: 100%;
            max-width: 280px;
        }
        
        .language-selector {
            width: 100%;
            max-width: 280px;
        }
    }
    
    /* Touch device optimizations */
    @media (hover: none) and (pointer: coarse) {
        .start-btn:hover {
            transform: none;
        }
        
        .language-selector:hover {
            transform: none;
        }
        
        .logo-top:hover {
            transform: none;
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        .language-selector:active {
            transform: scale(0.98);
        }
    }
    
    /* Landscape mobile optimizations */
    @media (max-width: 768px) and (orientation: landscape) {
        .main {
            padding: 20px 30px;
        }
        
        .logo-top {
            width: 70px;
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 26px;
            margin-top: 10px;
        }
        
        p {
            font-size: 14px;
            margin-top: 10px;
        }
        
        .start-btn {
            padding: 12px 24px;
            font-size: 15px;
            margin-top: 20px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="main">

        <img src="chui logo.jpeg" class="logo-top" alt="CHUITECHMA logo">

        <h1>Welcome to<br>CHUITECHMA CHAT BOT</h1>

        <p id="welcomeText">
            Your smart assistant for everything about CHUITECHMA University.  
            Ask anything about admissions, school fees, courses, results, departments,  
            campus life, or school updates — I'm here to guide you.
        </p>

        <select class="language-selector" id="indexLanguageSelector">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
        </select>

        <button class="start-btn" id="startBtn">
            Get Started
        </button>
    </div>

</div>

</body>
<script>
/* ========= Localization for Index Page ========= */
const indexTranslations = {
  en: {
    title: 'Welcome to<br>CHUITECHMA CHAT BOT',
    welcome: 'Your smart assistant for everything about CHUITECHMA University.  Ask anything about admissions, school fees, courses, results, departments,  campus life, or school updates — I\'m here to guide you.',
    getStarted: 'Get Started'
  },
  fr: {
    title: 'Bienvenue à<br>CHUITECHMA CHAT BOT',
    welcome: 'Votre assistant intelligent pour tout ce qui concerne l\'Université CHUITECHMA.  Demandez n\'importe quoi sur les admissions, les frais scolaires, les cours, les résultats, les départements,  la vie campus, ou les mises à jour — je suis là pour vous guider.',
    getStarted: 'Commencer'
  },
  es: {
    title: 'Bienvenido a<br>CHUITECHMA CHAT BOT',
    welcome: 'Tu asistente inteligente para todo sobre la Universidad CHUITECHMA.  Pregunta cualquier cosa sobre admisiones, tarifas escolares, cursos, resultados, departamentos,  vida campus, o actualizaciones — estoy aquí para guiarte.',
    getStarted: 'Comenzar'
  },
  zh: {
    title: '欢迎来到<br>CHUITECHMA 聊天机器人',
    welcome: '您关于CHUITECHMA大学一切事务的智能助手。询问有关招生、学费、课程、成绩、部门、校园生活或更新的任何问题——我在这里为您指导。',
    getStarted: '开始'
  }
};

let currentLanguage = 'en';

function setIndexLanguage(lang) {
  currentLanguage = lang;
  localStorage.setItem('chuitechma_language', lang);
  updateIndexUIText();
}

function updateIndexUIText() {
  const t = indexTranslations[currentLanguage];
  if (!t) return;
  
  document.querySelector('h1').innerHTML = t.title;
  document.getElementById('welcomeText').textContent = t.welcome;
  document.getElementById('startBtn').textContent = t.getStarted;
}

// Language selector event listener
document.getElementById('indexLanguageSelector').addEventListener('change', (e) => {
  setIndexLanguage(e.target.value);
});

// Start button event listener
document.getElementById('startBtn').addEventListener('click', () => {
  window.location.href = 'new_chat.html';
});

// Initialize language from localStorage
(function init() {
  const savedLang = localStorage.getItem('chuitechma_language');
  if (savedLang) {
    currentLanguage = savedLang;
    document.getElementById('indexLanguageSelector').value = savedLang;
  }
  updateIndexUIText();
})();
</script>
</html>
